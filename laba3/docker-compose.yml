version: "3"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"                 # веб-интерфейс Prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml   # конфиг (обязательно создай файл)
      - prometheus_data:/prometheus  # volume для данных (опционально)
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"                 # веб-интерфейс Grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin      # логин по умолчанию
      - GF_SECURITY_ADMIN_PASSWORD=admin  # пароль (смени при необходимости)
    volumes:
      - grafana_data:/var/lib/grafana     # volume для данных

volumes:
  prometheus_data:
  grafana_data: